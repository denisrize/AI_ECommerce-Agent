<svg width="100%" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<style>
  :root {
    --bg1: #ffffff; --bg2: #f5f4f0; --bg3: #eae8e4;
    --p: #1a1a18; --s: #6e6e6a; --t: #9c9a92;
    --b: rgba(0,0,0,0.15);
    --font-sans: system-ui, -apple-system, sans-serif;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg1: #1a1a18; --bg2: #2c2c2a; --bg3: #3d3d3a;
      --p: #e8e6de; --s: #9c9a92; --t: #6e6e6a;
      --b: rgba(255,255,255,0.15);
    }
  }
  text { font-family: var(--font-sans); }
  .t { font-size: 14px; fill: var(--p); font-weight: 400; }
  .ts { font-size: 12px; fill: var(--s); font-weight: 400; }
  .th { font-size: 14px; fill: var(--p); font-weight: 500; }
  .arr { stroke: var(--t); stroke-width: 1.5; }
  .leader { stroke: var(--t); stroke-width: 0.5; stroke-dasharray: 4 2; }

  /* Purple */
  .c-purple rect { fill: #EEEDFE; stroke: #534AB7; }
  .c-purple .th { fill: #3C3489; }
  .c-purple .ts { fill: #534AB7; }
  /* Teal */
  .c-teal rect { fill: #E1F5EE; stroke: #0F6E56; }
  .c-teal .th { fill: #085041; }
  .c-teal .ts { fill: #0F6E56; }
  /* Coral */
  .c-coral rect { fill: #FAECE7; stroke: #993C1D; }
  .c-coral .th { fill: #712B13; }
  .c-coral .ts { fill: #993C1D; }
  /* Amber */
  .c-amber rect { fill: #FAEEDA; stroke: #854F0B; }
  .c-amber .th { fill: #633806; }
  .c-amber .ts { fill: #854F0B; }
  /* Blue */
  .c-blue rect { fill: #E6F1FB; stroke: #185FA5; }
  .c-blue .th { fill: #0C447C; }
  .c-blue .ts { fill: #185FA5; }
  /* Gray */
  .c-gray rect { fill: #F1EFE8; stroke: #5F5E5A; }
  .c-gray .th { fill: #444441; }
  .c-gray .ts { fill: #5F5E5A; }

  @media (prefers-color-scheme: dark) {
    .c-purple rect { fill: #3C3489; stroke: #AFA9EC; }
    .c-purple .th { fill: #CECBF6; }
    .c-purple .ts { fill: #AFA9EC; }
    .c-teal rect { fill: #085041; stroke: #5DCAA5; }
    .c-teal .th { fill: #9FE1CB; }
    .c-teal .ts { fill: #5DCAA5; }
    .c-coral rect { fill: #712B13; stroke: #F0997B; }
    .c-coral .th { fill: #F5C4B3; }
    .c-coral .ts { fill: #F0997B; }
    .c-amber rect { fill: #633806; stroke: #FAC775; }
    .c-amber .th { fill: #FAEEDA; }
    .c-amber .ts { fill: #FAC775; }
    .c-blue rect { fill: #0C447C; stroke: #85B7EB; }
    .c-blue .th { fill: #B5D4F4; }
    .c-blue .ts { fill: #85B7EB; }
    .c-gray rect { fill: #444441; stroke: #B4B2A9; }
    .c-gray .th { fill: #D3D1C7; }
    .c-gray .ts { fill: #B4B2A9; }
  }
</style>
<defs><marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>

<text class="th" x="340" y="28" text-anchor="middle">Phase 1 architecture — how the pieces connect</text>

<!-- HTTP Request -->
<g class="c-gray">
  <rect x="245" y="48" width="190" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="68" text-anchor="middle" dominant-baseline="central">HTTP request</text>
</g>
<line x1="340" y1="88" x2="340" y2="112" class="arr" marker-end="url(#arrow)"/>

<!-- FastAPI main.py -->
<g class="c-purple">
  <rect x="200" y="114" width="280" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="133" text-anchor="middle" dominant-baseline="central">main.py</text>
  <text class="ts" x="340" y="151" text-anchor="middle" dominant-baseline="central">CORS, route registration</text>
</g>

<!-- Three routes -->
<line x1="240" y1="166" x2="120" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="340" y1="166" x2="340" y2="200" class="arr" marker-end="url(#arrow)"/>
<line x1="440" y1="166" x2="560" y2="200" class="arr" marker-end="url(#arrow)"/>

<g class="c-teal">
  <rect x="40" y="202" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="120" y="221" text-anchor="middle" dominant-baseline="central">users.py</text>
  <text class="ts" x="120" y="239" text-anchor="middle" dominant-baseline="central">GET, POST /users</text>
</g>

<g class="c-teal">
  <rect x="260" y="202" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="221" text-anchor="middle" dominant-baseline="central">products.py</text>
  <text class="ts" x="340" y="239" text-anchor="middle" dominant-baseline="central">GET, POST /products</text>
</g>

<g class="c-teal">
  <rect x="480" y="202" width="160" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="560" y="221" text-anchor="middle" dominant-baseline="central">orders.py</text>
  <text class="ts" x="560" y="239" text-anchor="middle" dominant-baseline="central">GET, POST /orders</text>
</g>

<!-- Depends(get_db) label -->
<text class="ts" x="340" y="280" text-anchor="middle">each route uses Depends(get_db)</text>

<!-- Arrows down to schemas and connection -->
<line x1="200" y1="290" x2="200" y2="316" class="arr" marker-end="url(#arrow)"/>
<line x1="480" y1="290" x2="480" y2="316" class="arr" marker-end="url(#arrow)"/>

<!-- Schemas -->
<g class="c-coral">
  <rect x="80" y="318" width="240" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="200" y="337" text-anchor="middle" dominant-baseline="central">schemas.py</text>
  <text class="ts" x="200" y="355" text-anchor="middle" dominant-baseline="central">Input validation, output shape</text>
</g>

<!-- Connection -->
<g class="c-amber">
  <rect x="360" y="318" width="240" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="480" y="337" text-anchor="middle" dominant-baseline="central">connection.py</text>
  <text class="ts" x="480" y="355" text-anchor="middle" dominant-baseline="central">Engine, session factory</text>
</g>

<!-- Arrow from connection to database models -->
<line x1="480" y1="370" x2="480" y2="398" class="arr" marker-end="url(#arrow)"/>
<line x1="200" y1="370" x2="200" y2="398" class="arr" marker-end="url(#arrow)"/>

<!-- Database models -->
<g class="c-blue">
  <rect x="80" y="400" width="520" height="52" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="419" text-anchor="middle" dominant-baseline="central">database.py — SQLAlchemy models</text>
  <text class="ts" x="340" y="437" text-anchor="middle" dominant-baseline="central">User, Product, Order, OrderItem</text>
</g>

<!-- Arrow to PostgreSQL -->
<line x1="340" y1="452" x2="340" y2="472" class="arr" marker-end="url(#arrow)"/>

<!-- PostgreSQL -->
<g class="c-gray">
  <rect x="220" y="474" width="240" height="40" rx="8" stroke-width="0.5"/>
  <text class="th" x="340" y="494" text-anchor="middle" dominant-baseline="central">PostgreSQL (Docker)</text>
</g>

<!-- Config on the side -->
<g class="c-gray">
  <rect x="560" y="400" width="90" height="52" rx="8" stroke-width="0.5" stroke-dasharray="4 2"/>
  <text class="ts" x="605" y="419" text-anchor="middle" dominant-baseline="central">config.py</text>
  <text class="ts" x="605" y="437" text-anchor="middle" dominant-baseline="central">reads .env</text>
</g>
<line class="leader" x1="600" y1="400" x2="530" y2="370"/>

</svg>