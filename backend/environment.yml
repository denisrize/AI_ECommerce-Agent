name: ecommerce-agent
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    # ── Web Framework ──
    - fastapi==0.109.0
    - uvicorn[standard]==0.27.0
    - sse-starlette==2.0.0        # SSE streaming for Phase 2

    # ── Database ──
    - sqlalchemy==2.0.25
    - asyncpg==0.29.0             # Async PostgreSQL driver
    - alembic==1.13.1             # Database migrations

    # ── Config & Validation ──
    - pydantic==2.5.3
    - pydantic-settings==2.1.0
    - python-dotenv==1.0.0
    - email-validator==2.1.0      # Required by Pydantic's EmailStr

    # ── LLM (Phase 2+) ──
    - openai==1.12.0              # Direct SDK — no langchain needed

    # ── Testing ──
    - pytest==7.4.4
    - pytest-asyncio==0.23.3
    - httpx==0.26.0               # Async HTTP client for tests
