# Alembic Configuration File
#
# This file is read by Alembic when you run commands like:
#   alembic revision --autogenerate -m "Add discount_code column"
#   alembic upgrade head
#   alembic downgrade -1

[alembic]
# Path to migration scripts (relative to this file)
script_location = alembic

# The database URL. We override this in env.py to read from our
# .env file, but Alembic requires a default here.
sqlalchemy.url = postgresql://postgres:postgres@localhost:5432/ecommerce

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
